name: Monitor PF Completo

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar Playwright
        run: |
          pip install playwright requests
          playwright install chromium
          sudo apt-get update
          sudo apt-get install -y libasound2t64 libgtk-3-0t64
      - name: Executar
        run: python monitor.py
