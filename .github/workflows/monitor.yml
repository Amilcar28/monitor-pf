name: Monitor PF

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium
          sudo apt-get update
          sudo apt-get install -y libasound2t64 libatk-bridge2.0-0t64 libgtk-3-0t64 libgbm1 libxkbcommon0
      
      - name: Run monitor
        run: python monitor.py
