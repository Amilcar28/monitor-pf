name: Monitor PF 24/7

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium
          sudo apt-get update
          sudo apt-get install -y libasound2t64 libatk-bridge2.0-0t64 libgtk-3-0t64 libgbm1 libxkbcommon0
      
      - name: Run monitor
        run: python monitor_pf_completo.py
      
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: comprovante
          path: comprovante_*.pdf
          if-no-files-found: ignore
